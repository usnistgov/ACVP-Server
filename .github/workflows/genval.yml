name: Build, Test, and Package GenVal

on:
  push:
    paths:
      - 'gen-val/**'
    branches:
      - master
  pull_request:
    paths:
      - 'gen-val/**'

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore & Build GenVal App
      run: |
        dotnet restore gen-val/samples/GenValAppRunner/src
        dotnet build gen-val/samples/GenValAppRunner/src --configuration Release

    - name: Run Tests
      run: |
        dotnet test gen-val/samples/GenValAppRunner/test --configuration Release --no-build

  docker-package:
    runs-on: macos-latest
    needs: build-and-test

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Publish GenVal App
      run: |
        dotnet publish gen-val/samples/GenValAppRunner/src -c Release -o out/genval

    - name: Build Docker Image
      run: docker build -t katalyst/genval:latest .

    - name: Push to Registry (optional)
      if: github.ref == 'refs/heads/main'
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
        docker tag katalyst/genval:latest ${{ secrets.DOCKER_REGISTRY }}/genval:latest
        docker push ${{ secrets.DOCKER_REGISTRY }}/genval:latest

    - name: Notify on Success
      if: success()
      run: echo "GenVal build + tests passed and Docker image built."

    - name: Notify on Failure
      if: failure()
      run: echo " GenVal pipeline failed at some step."
