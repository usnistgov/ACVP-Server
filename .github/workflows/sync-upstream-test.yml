name: Sync NIST ACVP-Server (Test on kdykes/Bug3)

on:
  push:
    branches:
      - kdykes/Bug3
  workflow_dispatch:

jobs:
  sync:
    name: Sync with NIST ACVP-Server (Test)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout forked repo
      uses: actions/checkout@v4
      with:
        persist-credentials: false
        fetch-depth: 0

    - name: Set up Git identity
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Add upstream remote
      run: git remote add upstream https://github.com/usnistgov/ACVP-Server.git

    - name: Fetch upstream
      run: git fetch upstream

    - name: Check for upstream changes
      id: upstream-check
      run: |
        git fetch upstream master
        if git diff --quiet HEAD..upstream/master; then
          echo "has_changes=false" >> $GITHUB_OUTPUT
        else
          echo "has_changes=true" >> $GITHUB_OUTPUT
        fi

    - name: Exit if no changes
      if: steps.upstream-check.outputs.has_changes != 'true'
      run: echo "No changes to sync. Exiting."

    - name: Create sync branch from origin/kdykes/Bug3
      if: steps.upstream-check.outputs.has_changes == 'true'
      run: |
        git fetch origin kdykes/Bug3
        git checkout -B sync/upstream-changes origin/kdykes/Bug3

    - name: Attempt merge from upstream/master
      if: steps.upstream-check.outputs.has_changes == 'true'
      id: merge
      run: |
        git merge upstream/master --no-edit || echo "conflict=true" >> $GITHUB_OUTPUT

    - name: Check for merge conflicts
      if: steps.merge.outputs.conflict == 'true'
      run: |
        echo "::error ::Merge conflict detected. Manual resolution required."
        exit 1

    - name: Push changes to remote
      if: steps.merge.outputs.conflict != 'true'
      env:
        PAT_PUSH: ${{ secrets.PAT_PUSH }}
      run: |
        git remote set-url origin https://x-access-token:${PAT_PUSH}@github.com/${{ github.repository }}
        git push origin sync/upstream-changes

    - name: Create Pull Request via GitHub CLI
      if: steps.merge.outputs.conflict != 'true'
      run: |
        gh pr create \
          --title "Sync from NIST upstream (Test)" \
          --body "This is a test PR to sync from upstream (usnistgov/ACVP-Server) into kdykes/Bug3." \
          --head sync/upstream-changes \
          --base kdykes/Bug3
      env:
        GH_TOKEN: ${{ secrets.PAT_PUSH }}

    - name: Auto-merge Pull Request 
      if: steps.merge.outputs.conflict != 'true'
      run: |
        PR_NUMBER=$(gh pr list --state open --head sync/upstream-changes --json number --jq '.[0].number')
        gh pr merge $PR_NUMBER --squash --auto
      env:
        GH_TOKEN: ${{ secrets.PAT_PUSH }}
